<!-- @dsCard group="Brand" -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>더블디럭스 · 브랜드</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <style>
      :root {
        --line: #ece8e3;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Pretendard, system-ui, sans-serif;
        background: #fbfaf8;
        color: #0b0b12;
        padding: 40px;
      }
      .grad-text {
        background: linear-gradient(120deg, #ff6b1a, #ff8443 35%, #7c5cff);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .row { display: flex; align-items: center; gap: 14px; }
      h1 { font-size: 30px; font-weight: 800; margin: 0; letter-spacing: -0.02em; }
      .sub { color: #6b6b76; margin-top: 6px; }
      .gradbar {
        height: 64px; border-radius: 18px; margin-top: 28px;
        background: linear-gradient(135deg, #ff6b1a 0%, #ff8443 40%, #7c5cff 100%);
        box-shadow: 0 12px 40px rgba(124,92,255,.18);
      }
      .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 20px; }
      .sw { border: 1px solid var(--line); border-radius: 16px; overflow: hidden; background: #fff; }
      .chip { height: 70px; }
      .meta { padding: 10px 12px; font-size: 12px; }
      .meta b { display: block; font-size: 13px; }
      .meta span { color: #6b6b76; }
    </style>
  </head>
  <body>
    <div class="row">
      <svg width="44" height="44" viewBox="0 0 48 48" fill="none">
        <defs>
          <linearGradient id="g" x1="4" y1="6" x2="44" y2="42" gradientUnits="userSpaceOnUse">
            <stop stop-color="#FF6B1A" /><stop offset="0.45" stop-color="#FF8443" /><stop offset="1" stop-color="#7C5CFF" />
          </linearGradient>
        </defs>
        <rect x="24" y="3" width="22" height="22" rx="6" transform="rotate(45 24 3)" fill="url(#g)" opacity="0.28" />
        <rect x="24" y="9" width="22" height="22" rx="6" transform="rotate(45 24 9)" fill="url(#g)" />
        <rect x="21.5" y="20" width="3" height="11" rx="1.5" fill="#fff" />
        <path d="M26 20.5c3.6 0 6 2.2 6 5.5s-2.4 5.5-6 5.5" stroke="#fff" stroke-width="3" stroke-linecap="round" fill="none" />
      </svg>
      <div>
        <h1>더블<span class="grad-text">디럭스</span></h1>
        <div class="sub">현금화 없이 코인 그대로 쓰는 동네 중고거래</div>
      </div>
    </div>

    <div class="gradbar"></div>

    <div class="swatches">
      <div class="sw"><div class="chip" style="background:#FF6B1A"></div><div class="meta"><b>Brand</b><span>#FF6B1A</span></div></div>
      <div class="sw"><div class="chip" style="background:#7C5CFF"></div><div class="meta"><b>Violet</b><span>#7C5CFF</span></div></div>
      <div class="sw"><div class="chip" style="background:#10C99A"></div><div class="meta"><b>Mint</b><span>#10C99A</span></div></div>
      <div class="sw"><div class="chip" style="background:#0B0B12"></div><div class="meta"><b>Ink</b><span>#0B0B12</span></div></div>
    </div>
  </body>
</html>
