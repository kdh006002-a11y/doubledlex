<!-- @dsCard group="Components" -->
<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>더블디럭스 · 상품 카드</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css"
    />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0; padding: 40px; background: #fbfaf8; color: #0b0b12;
        font-family: Pretendard, system-ui, sans-serif;
      }
      .grid { display: grid; grid-template-columns: repeat(2, 220px); gap: 16px; }
      .card {
        border: 1px solid #ece8e3; border-radius: 24px; overflow: hidden; background: #fff;
        box-shadow: 0 1px 2px rgba(16,24,40,.04), 0 8px 24px rgba(16,24,40,.06);
      }
      .thumb {
        aspect-ratio: 1; display: grid; place-items: center; font-size: 64px; position: relative;
      }
      .t1 { background: linear-gradient(135deg,#FFD9C2,#FFB78F,#FF8A5B); }
      .t2 { background: linear-gradient(135deg,#E6DEFF,#C9B8FF,#9B8CFF); }
      .badge {
        position: absolute; left: 12px; top: 12px; background: rgba(0,0,0,.55); color: #fff;
        font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 999px;
      }
      .body { padding: 16px; }
      .meta { font-size: 11px; color: #6b6b76; }
      .title { font-size: 14px; font-weight: 600; margin: 4px 0 10px; line-height: 1.35; }
      .krw { font-size: 20px; font-weight: 800; letter-spacing: -0.01em; }
      .coin { font-size: 12px; font-weight: 600; color: #6A3FF0; margin-top: 2px; }
      .stats { display: flex; gap: 12px; font-size: 12px; color: #6b6b76; border-top: 1px solid #ece8e3; margin-top: 12px; padding-top: 12px; }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="card">
        <div class="thumb t1"><span>📱</span><span class="badge">거의 새것</span></div>
        <div class="body">
          <div class="meta">서울 강남구 역삼동 · 7분 전</div>
          <div class="title">아이패드 프로 11인치 4세대 (M2)</div>
          <div class="krw">₩850,000</div>
          <div class="coin">Ξ 0.17708 ETH</div>
          <div class="stats"><span>♡ 23</span><span>💬 8</span></div>
        </div>
      </div>
      <div class="card">
        <div class="thumb t2"><span>💻</span><span class="badge">거의 새것</span></div>
        <div class="body">
          <div class="meta">서울 용산구 한남동 · 34분 전</div>
          <div class="title">맥북 에어 M3 13인치</div>
          <div class="krw">₩1,150,000</div>
          <div class="coin">Ξ 0.23958 ETH</div>
          <div class="stats"><span>♡ 41</span><span>💬 15</span></div>
        </div>
      </div>
    </div>
  </body>
</html>
